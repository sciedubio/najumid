<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 우리 학교 시간표</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 1200px;
        }

        /* 날짜가 들어갈 큰 제목 스타일 */
        .header h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin: 0 0 8px 0;
            font-weight: 800;
        }

        .header p {
            font-size: 0.95rem;
            color: #64748b;
            margin: 0;
        }

        .table-container {
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 1300px;
            table-layout: fixed;
            font-size: 0.85rem;
        }

        /* 교시 열의 너비 고정 */
        table th:first-child, table td.time-cell {
            width: 70px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px 4px;
            text-align: center;
            vertical-align: middle;
            line-height: 1.4;
            white-space: normal;
            word-break: keep-all;
        }

        th {
            font-weight: 600;
        }

        /* 학년 표시용 큰 헤더 (병합된 셀) */
        th.grade-header {
            font-size: 1.1rem;
            font-weight: 800;
            padding: 12px 0;
        }

        /* 첫 번째 열(교시) 고정 설정 */
        td.time-cell, th.time-cell-header {
            font-weight: 700;
            position: sticky;
            left: 0;
            z-index: 10;
            border-right: 2px solid var(--primary-color);
        }

        /* 과목명-선생님 셀 병합처럼 보이게 하는 트릭 */
        td.time-cell-top { border-bottom: none !important; }
        td.time-cell-bottom { border-top: none !important; }

        td.subject-cell {
            font-weight: 700;
            border-bottom: none !important; 
            padding-bottom: 2px;
            color: #1e293b;
        }

        td.teacher-cell {
            font-size: 0.75rem;
            color: #64748b; 
            border-top: none !important; 
            padding-top: 2px;
        }

        tr:hover td.subject-cell, tr:hover td.teacher-cell {
            filter: brightness(0.95);
        }

        .loader-container { padding: 50px; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <!-- 자바스크립트가 여기에 날짜를 뽑아와서 넣습니다 -->
        <h1 id="main-title">📅 실시간 오늘의 시간표</h1>
        <p>열 너비 균일화 및 학년별 중앙 정렬 적용 완료</p>
    </div>

    <div class="table-container">
        <div id="loader" class="loader-container">
            <div class="loader"></div>
            <div>시간표 데이터를 불러오고 예쁘게 꾸미는 중입니다...</div>
        </div>
        <table id="timetable">
            <thead id="timetable-head">
                <!-- 요일, 학년, 반 등 제목부분이 들어갈 곳 -->
            </thead>
            <tbody id="timetable-body">
                <!-- 시간표 데이터가 들어갈 곳 -->
            </tbody>
        </table>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRRri5Q0YRwIkcGrjMpqeyrZPQJBJTiQ9F9YKMJxrvYk_P2Q9LZW7sP61nQMtXse5-S85zFbXBOz9f_/pub?gid=1583258371&single=true&output=csv";

        function getGradeColor(colIndex) {
            if (colIndex >= 1 && colIndex <= 4) return "#fef9c3"; // 1학년 노랑
            if (colIndex >= 5 && colIndex <= 9) return "#dcfce3"; // 2학년 초록
            if (colIndex >= 10 && colIndex <= 14) return "#dbeafe"; // 3학년 파랑
            if (colIndex >= 15 && colIndex <= 16) return "#f3e8ff"; // 특수학급 보라
            return "#ffffff";
        }

        function getPeriodColor(periodNum) {
            const colors = [
                "#ffffff", "#ffe4e6", "#ffedd5", "#fef3c7", "#dcfce3", "#dbeafe", "#e0e7ff", "#fae8ff"
            ];
            return colors[periodNum] || "#f8fafc";
        }

        function loadTimetable() {
            Papa.parse(sheetCsvUrl, {
                download: true,
                header: false,
                skipEmptyLines: 'greedy',
                complete: function(results) {
                    const data = results.data;
                    const thead = document.getElementById('timetable-head');
                    const tbody = document.getElementById('timetable-body');
                    const titleElement = document.getElementById('main-title');
                    
                    let headHtml = "";
                    let bodyHtml = "";
                    let currentPeriod = 0;

                    data.forEach((row, rowIndex) => {
                        let slicedRow = row.slice(0, 17); // 17칸(교시+16개반)만 유지하고 우측의 이름/월중계획 등 삭제

                        // ★ 1. 첫 번째 줄(Row 0): 날짜 추출 후 화면에 표시하고 표에서는 숨김
                        if (rowIndex === 0) {
                            let extractedDate = "";
                            row.forEach(cell => {
                                if (cell && cell.includes("시간표")) {
                                    extractedDate = cell.trim();
                                }
                            });
                            if (extractedDate) {
                                titleElement.innerText = "📅 " + extractedDate;
                            }
                            return; // 현재 행을 표에 추가하지 않고 넘어감
                        }

                        // ★ 2. 두 번째 줄(Row 1): '1학년', '2학년' 등 헤더 중앙 정렬(Colspan 적용)
                        if (rowIndex === 1) {
                            headHtml += "<tr>";
                            headHtml += `<th rowspan="2" class="time-cell-header" style="background-color: var(--primary-color); color: white;">교시</th>`;
                            
                            let currentHeader = "";
                            let colspanCount = 0;
                            let startIndex = 1;

                            for (let i = 1; i < 17; i++) {
                                let cell = slicedRow[i] ? slicedRow[i].trim() : "";
                                
                                if (cell !== "") {
                                    if (currentHeader !== "") {
                                        headHtml += `<th class="grade-header" colspan="${colspanCount}" style="background-color: ${getGradeColor(startIndex)}; color: #1e293b;">${currentHeader}</th>`;
                                    }
                                    currentHeader = cell;
                                    colspanCount = 1;
                                    startIndex = i;
                                } else {
                                    if (currentHeader !== "") colspanCount++;
                                }
                            }
                            if (currentHeader !== "") {
                                headHtml += `<th class="grade-header" colspan="${colspanCount}" style="background-color: ${getGradeColor(startIndex)}; color: #1e293b;">${currentHeader}</th>`;
                            }
                            headHtml += "</tr>";
                            return;
                        }

                        // ★ 3. 세 번째 줄(Row 2): '1반', '2반' 등 반 표시
                        if (rowIndex === 2) {
                            headHtml += "<tr>";
                            // i=1 부터 시작 (교시 열은 위에서 rowspan="2"로 처리했으므로 생략)
                            for (let i = 1; i < 17; i++) {
                                let cell = slicedRow[i] ? slicedRow[i].replace(/\n/g, "<br>") : "";
                                headHtml += `<th style="background-color: ${getGradeColor(i)}; color: #1e293b;">${cell}</th>`;
                            }
                            headHtml += "</tr>";
                            return;
                        }

                        // ★ 4. 본문 데이터 (Row 3 이상)
                        let isTeacherRow = slicedRow[0] === undefined || slicedRow[0].trim() === "";
                        
                        if (!isTeacherRow && slicedRow[0]) {
                            if (slicedRow[0].includes("점심")) currentPeriod = 0; 
                            else {
                                let match = slicedRow[0].match(/\d+/);
                                if (match) currentPeriod = parseInt(match[0], 10);
                            }
                        }

                        let pColor = getPeriodColor(currentPeriod);
                        if (slicedRow[0] && slicedRow[0].includes("점심")) pColor = "#f1f5f9";

                        bodyHtml += "<tr>";
                        slicedRow.forEach((cell, cellIndex) => {
                            let formattedCell = cell ? cell.replace(/\n/g, "<br>") : "";
                            let gColor = getGradeColor(cellIndex);

                            if (cellIndex === 0) {
                                if (isTeacherRow) {
                                    bodyHtml += `<td class="time-cell time-cell-bottom" style="background-color: ${pColor}">${formattedCell}</td>`;
                                } else {
                                    bodyHtml += `<td class="time-cell time-cell-top" style="background-color: ${pColor}">${formattedCell}</td>`;
                                }
                            } else {
                                if (isTeacherRow) {
                                    bodyHtml += `<td class="teacher-cell" style="background-color: ${gColor}">${formattedCell}</td>`;
                                } else {
                                    bodyHtml += `<td class="subject-cell" style="background-color: ${gColor}">${formattedCell}</td>`;
                                }
                            }
                        });
                        bodyHtml += "</tr>";
                    });

                    // 생성된 HTML 표에 삽입
                    thead.innerHTML = headHtml;
                    tbody.innerHTML = bodyHtml;
                    document.getElementById('loader').style.display = 'none';
                },
                error: function(err) {
                    document.getElementById('loader').innerHTML = `<div style="color:red; font-weight:bold;">데이터를 불러오지 못했습니다.</div>`;
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadTimetable);
    </script>
</body>
</html>
