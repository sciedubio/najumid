<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA 및 모바일 최적화 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="스마트 시간표">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4c5.svg">
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f4c5.svg">
    
    <title>스마트 시간표</title>
    
    <!-- PapaParse & Noto Sans KR 폰트 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 테마 변수 (기본: 실험실 블루 테마) */
            --main-color: #3b82f6; 
            --main-color-light: rgba(59, 130, 246, 0.15);
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --lunch-bg: rgba(254, 240, 138, 0.6);
            --lunch-text: #854d0e;
        }

        /* 초기화 및 기본 폰트 */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* 글래스모피즘 유틸리티 클래스 */
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* 버튼 등 Scale 애니메이션 클래스 */
        .interactive {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
            cursor: pointer;
        }
        .interactive:active {
            transform: scale(0.95);
        }

        /* 앱 바 (상단 테마 및 안내 버튼) */
        .app-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--main-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 헤더 영역 */
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
            padding: 25px 15px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 워터마크 */
        .watermark {
            font-size: 0.75rem;
            color: var(--main-color);
            font-weight: 700;
            opacity: 0.7;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .header h1 {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            color: var(--main-color);
            margin: 0 0 10px 0;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0 0 20px 0;
            font-weight: 500;
        }

        /* 컨트롤 패널 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
        }

        .controls select, .controls input {
            padding: 12px 18px;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.7);
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 500;
            color: var(--text-dark);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.2s ease, transform 0.15s;
        }

        .controls select:focus, .controls input:focus {
            border-color: var(--main-color);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 4px var(--main-color-light);
            transform: scale(1.02);
        }

        /* 시간표 테이블 컨테이너 */
        .table-container {
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            border-radius: 20px;
            -webkit-overflow-scrolling: touch;
            padding: 10px; /* 그림자 잘림 방지 */
            /* 스크롤바 숨기기 (깔끔한 UI) */
            -ms-overflow-style: none; 
            scrollbar-width: none;  
        }
        .table-container::-webkit-scrollbar { display: none; }

        table {
            border-collapse: separate;
            border-spacing: 8px; /* 카드 사이 간격 */
            width: 100%;
            min-width: 1100px;
            table-layout: fixed;
        }

        table.filtered-view {
            min-width: 100%;
        }

        /* 열 너비 고정 */
        table th:first-child, table td.time-cell {
            width: 60px;
        }

        /* 모든 셀 기본 스타일 (글래스모피즘) */
        th, td {
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 14px;
            padding: 10px 4px;
            text-align: center;
            vertical-align: middle;
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            white-space: normal;
            word-break: break-word;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        th { 
            font-weight: 700; 
            font-size: clamp(0.95rem, 1.5vw, 1.1rem); 
        }
        
        th.grade-header { 
            font-size: clamp(1.1rem, 2vw, 1.25rem); 
            font-weight: 900; 
            padding: 14px 0; 
            background: var(--main-color-light);
            color: var(--main-color);
        }

        /* 교시 고정 열 */
        td.time-cell, th.time-cell-header {
            font-weight: 900;
            font-size: clamp(0.95rem, 1.5vw, 1.15rem);
            position: sticky;
            left: 0;
            z-index: 10;
            color: var(--main-color);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 4px 0 8px rgba(0,0,0,0.04);
            backdrop-filter: blur(10px);
        }
        
        th.time-cell-header {
            background-color: var(--main-color);
            color: white;
            border-color: var(--main-color);
        }

        /* 시간표 데이터 카드 */
        td.card-cell {
            height: 75px; 
            padding: 8px 4px;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s, background 0.3s;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            gap: 4px; 
        }

        .subject-text {
            font-weight: 900;
            font-size: clamp(0.85rem, 2vw, 1.15rem); 
            letter-spacing: -0.5px;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .teacher-text {
            font-size: clamp(0.75rem, 1.5vw, 0.85rem); 
            color: var(--text-muted); 
            font-weight: 500;
        }

        /* 카드 터치(클릭) 애니메이션 */
        td.card-cell:not(.empty-card):active {
            transform: scale(0.92);
        }

        /* 점심시간 */
        .lunch-row td {
            background-color: var(--lunch-bg) !important;
            color: var(--lunch-text);
            font-weight: 900;
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            height: 55px;
            letter-spacing: 2px;
            border-color: rgba(250, 204, 21, 0.4);
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.5);
        }
        
        .lunch-row td.time-cell {
            background-color: rgba(253, 224, 71, 0.9) !important;
        }

        /* 검색 하이라이트 */
        .highlight-teacher {
            background: linear-gradient(135deg, #fef08a 0%, #fde047 100%) !important; 
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.3), inset 0 2px 5px rgba(255,255,255,0.8) !important;
            border: 1px solid #eab308;
            transform: scale(1.02);
            z-index: 5;
        }
        .highlight-teacher .subject-text, .highlight-teacher .teacher-text {
            color: #854d0e !important;
        }

        /* 현재 교시 깜빡임 (글래스모피즘 스타일) */
        @keyframes glow {
            0% { box-shadow: 0 4px 6px rgba(0,0,0,0.02), inset 0 0 0 1px transparent; }
            50% { box-shadow: 0 8px 20px var(--main-color-light), inset 0 0 0 2px var(--main-color); }
            100% { box-shadow: 0 4px 6px rgba(0,0,0,0.02), inset 0 0 0 1px transparent; }
        }

        .current-period-row td {
            animation: glow 2.5s infinite;
        }
        
        .current-period-row td:not(.time-cell) {
            position: relative;
            z-index: 1; 
        }

        /* 가이드 모달 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content h2 {
            color: var(--main-color);
            margin-top: 0;
            font-weight: 900;
        }

        .modal-content p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-dark);
            text-align: left;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 12px;
        }

        .modal-close-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--main-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            width: 100%;
        }

        .modal-watermark {
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .hidden-col { display: none !important; }

        /* 로더 */
        .loader-container { padding: 50px; text-align: center; }
        .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid var(--main-color); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 16px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 모바일 최적화 (Mobile-First 대응) */
        @media (max-width: 600px) {
            .header { padding: 20px 10px; margin-bottom: 10px; border-radius: 16px; }
            .controls { flex-direction: column; }
            table { border-spacing: 5px; }
            td.card-cell { height: 65px; }
        }
    </style>
</head>
<body>

    <!-- 앱 바 (PWA 안내 및 테마 변경) -->
    <div class="app-bar">
        <button class="icon-btn interactive glass" onclick="changeTheme()" title="테마 변경">🎨</button>
        <button class="icon-btn interactive glass" onclick="toggleModal(true)" title="앱 설치 안내">📱</button>
    </div>

    <!-- 헤더 -->
    <div class="header glass">
        <div class="watermark">Created by Yang DH</div>
        <h1 id="main-title">📅 실시간 오늘의 시간표</h1>
        <p>1분 단위 자동 새로고침 / 글래스모피즘 UI</p>
        
        <div class="controls">
            <select id="class-selector" class="interactive" onchange="filterClass()">
                <option value="all">🏫 전체 보기</option>
                <optgroup label="📚 학년별 보기">
                    <option value="grade-1">1학년 전체</option>
                    <option value="grade-2">2학년 전체</option>
                    <option value="grade-3">3학년 전체</option>
                </optgroup>
                <optgroup label="🌱 1학년">
                    <option value="1">1학년 1반</option>
                    <option value="2">1학년 2반</option>
                    <option value="3">1학년 3반</option>
                    <option value="4">1학년 4반</option>
                </optgroup>
                <optgroup label="🌿 2학년">
                    <option value="5">2학년 1반</option>
                    <option value="6">2학년 2반</option>
                    <option value="7">2학년 3반</option>
                    <option value="8">2학년 4반</option>
                    <option value="9">2학년 5반</option>
                </optgroup>
                <optgroup label="🌳 3학년">
                    <option value="10">3학년 1반</option>
                    <option value="11">3학년 2반</option>
                    <option value="12">3학년 3반</option>
                    <option value="13">3학년 4반</option>
                    <option value="14">3학년 5반</option>
                </optgroup>
            </select>
            <input type="text" id="teacher-search" class="interactive" placeholder="🔍 선생님 이름 검색 (예: 홍길동)" onkeyup="searchTeacher()">
        </div>
    </div>

    <!-- 시간표 테이블 영역 -->
    <div class="table-container">
        <div id="loader" class="loader-container">
            <div class="loader"></div>
            <div>데이터를 가져와 카드를 구성하고 있습니다...</div>
        </div>
        <table id="timetable">
            <thead id="timetable-head"></thead>
            <tbody id="timetable-body"></tbody>
        </table>
    </div>

    <!-- PWA 홈 화면 추가 가이드 모달 -->
    <div class="modal-overlay" id="pwaModal" onclick="if(event.target===this) toggleModal(false)">
        <div class="modal-content glass">
            <h2>앱처럼 사용하기 📱</h2>
            <p>
                <strong>🍎 아이폰 (Safari)</strong><br>
                화면 하단의 [공유 아이콘(네모화살표)]을 누르고<br>
                <strong>'홈 화면에 추가'</strong>를 선택하세요.
            </p>
            <p>
                <strong>🤖 안드로이드 (Chrome)</strong><br>
                화면 우측 상단의 [메뉴(점 3개)]를 누르고<br>
                <strong>'홈 화면에 추가'</strong>를 선택하세요.
            </p>
            <button class="modal-close-btn interactive" onclick="toggleModal(false)">확인</button>
            <div class="modal-watermark">Created by Yang DH</div>
        </div>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBWdcFSF8js6Hhr5o2HA8kdfxRcWwd6MF_Rkn6gBcaZI47_6AOMXnQZPYXvgjv81Wvx8TD98UkfbGY/pub?gid=0&single=true&output=csv";
        let globalTimetableData = [];

        // --- 테마 관리 로직 ---
        const themes = [
            { name: "실험실 블루", color: "#3b82f6", bg: "linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%)" },
            { name: "환경 그린", color: "#10b981", bg: "linear-gradient(135deg, #dcfce3 0%, #fef9c3 100%)" },
            { name: "교통 오렌지", color: "#f97316", bg: "linear-gradient(135deg, #ffedd5 0%, #fce7f3 100%)" },
            { name: "벚꽃 핑크", color: "#ec4899", bg: "linear-gradient(135deg, #fce7f3 0%, #e0e7ff 100%)" }
        ];
        let currentThemeIndex = 0;

        function changeTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const theme = themes[currentThemeIndex];
            const root = document.documentElement;
            
            // CSS 변수 업데이트
            root.style.setProperty('--main-color', theme.color);
            root.style.setProperty('--bg-gradient', theme.bg);
            
            // rgba 값 계산 (투명도 0.15)
            const r = parseInt(theme.color.slice(1, 3), 16);
            const g = parseInt(theme.color.slice(3, 5), 16);
            const b = parseInt(theme.color.slice(5, 7), 16);
            root.style.setProperty('--main-color-light', `rgba(${r}, ${g}, ${b}, 0.15)`);
            
            // PWA 테마 컬러 태그 업데이트
            document.querySelector('meta[name="theme-color"]').setAttribute('content', theme.color);
        }

        // --- 모달 토글 로직 ---
        function toggleModal(show) {
            const modal = document.getElementById('pwaModal');
            if (show) modal.classList.add('active');
            else modal.classList.remove('active');
        }

        function setTodayTitle() {
            const today = new Date();
            const month = today.getMonth() + 1;
            const date = today.getDate();
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            const dayName = dayNames[today.getDay()];
            document.getElementById('main-title').innerText = `📅 ${month}월 ${date}일(${dayName}) 시간표`;
        }

        // 글래스모피즘 스타일의 투명 파스텔톤 반환
        function getGradeColor(colIndex, periodNum) {
            const isEven = periodNum % 2 === 0;
            // rgba를 활용하여 뒷배경이 살짝 비치게 처리
            if (colIndex >= 1 && colIndex <= 4) return isEven ? "rgba(254, 240, 138, 0.4)" : "rgba(254, 249, 195, 0.5)"; // 노랑
            if (colIndex >= 5 && colIndex <= 9) return isEven ? "rgba(187, 247, 208, 0.4)" : "rgba(220, 252, 227, 0.5)"; // 초록
            if (colIndex >= 10 && colIndex <= 14) return isEven ? "rgba(191, 219, 254, 0.4)" : "rgba(219, 234, 254, 0.5)"; // 파랑
            return "rgba(255, 255, 255, 0.4)";
        }

        function loadTimetable() {
            setTodayTitle();

            Papa.parse(sheetCsvUrl, {
                download: true,
                header: false,
                skipEmptyLines: 'greedy',
                complete: function(results) {
                    globalTimetableData = results.data;
                    renderTable();
                    document.getElementById('loader').style.display = 'none';
                    
                    filterClass(); 
                    searchTeacher(); 
                    checkCurrentPeriod();
                },
                error: function(err) {
                    document.getElementById('loader').innerHTML = `<div style="color:red; font-weight:bold;">데이터를 불러오지 못했습니다.</div>`;
                }
            });
        }

        function renderTable() {
            if(!globalTimetableData.length) return;
            const thead = document.getElementById('timetable-head');
            const tbody = document.getElementById('timetable-body');
            
            let headHtml = "";
            let bodyHtml = "";
            let currentPeriod = 1;

            for (let rowIndex = 1; rowIndex < globalTimetableData.length; rowIndex++) {
                let row1 = globalTimetableData[rowIndex].slice(0, 15); 
                
                // 헤더 영역 렌더링
                if (rowIndex === 1) {
                    headHtml += "<tr>";
                    headHtml += `<th rowspan="2" class="time-cell-header">교시</th>`;
                    let currentHeader = "";
                    let colspanCount = 0;
                    let startIndex = 1;
                    for (let i = 1; i < 15; i++) {
                        let cell = row1[i] ? row1[i].trim() : "";
                        if (cell !== "") {
                            if (currentHeader !== "") {
                                headHtml += `<th class="grade-header col-${startIndex}" colspan="${colspanCount}" data-start="${startIndex}" data-span="${colspanCount}">${currentHeader}</th>`;
                            }
                            currentHeader = cell;
                            colspanCount = 1;
                            startIndex = i;
                        } else {
                            if (currentHeader !== "") colspanCount++;
                        }
                    }
                    if (currentHeader !== "") {
                        headHtml += `<th class="grade-header col-${startIndex}" colspan="${colspanCount}" data-start="${startIndex}" data-span="${colspanCount}">${currentHeader}</th>`;
                    }
                    headHtml += "</tr>";
                    continue;
                }

                if (rowIndex === 2) {
                    headHtml += "<tr>";
                    for (let i = 1; i < 15; i++) {
                        let cell = row1[i] ? row1[i].replace(/\n/g, "<br>") : "";
                        headHtml += `<th class="col-${i}" style="background-color: ${getGradeColor(i, 1)};">${cell}</th>`;
                    }
                    headHtml += "</tr>";
                    continue;
                }

                // 본문 영역
                let rowStr = row1.join(" ").trim();
                if (rowStr === "") continue;

                // 점심시간 처리
                if (rowStr.includes("점심")) {
                     bodyHtml += `<tr class="lunch-row period-0">`;
                     bodyHtml += `<td class="time-cell">점심</td>`;
                     let lunchText = "점심시간 12:20 ~ 13:20";
                     for(let i=1; i<15; i++) {
                         if(row1[i] && row1[i].trim() !== "") {
                             lunchText = row1[i].replace(/\n/g, " ");
                             break;
                         }
                     }
                     bodyHtml += `<td colspan="14" class="lunch-content">${lunchText}</td>`;
                     bodyHtml += `</tr>`;
                     currentPeriod = 0;
                     continue;
                }

                let row1PeriodText = row1[0] ? row1[0].trim() : "";
                let match = row1PeriodText.match(/\d+/);
                if (match) currentPeriod = parseInt(match[0], 10);

                if (row1PeriodText === "" && currentPeriod !== 0) continue;

                let nextRow = (rowIndex + 1 < globalTimetableData.length) ? globalTimetableData[rowIndex + 1].slice(0, 15) : Array(15).fill("");
                let nextRowPeriodText = nextRow[0] ? nextRow[0].trim() : "";
                
                let hasTeacherRow = (nextRowPeriodText === "" && nextRow.join("").trim() !== "");
                
                // 본문 카드 렌더링
                bodyHtml += `<tr class="period-${currentPeriod}">`;
                bodyHtml += `<td class="time-cell">${row1PeriodText.replace(/\n/g, "<br>")}</td>`;

                for (let c = 1; c < 15; c++) {
                    let subject = row1[c] ? row1[c].replace(/\n/g, "<br>") : "";
                    let teacher = (hasTeacherRow && nextRow[c]) ? nextRow[c].replace(/\n/g, "<br>") : "";
                    let gColor = getGradeColor(c, currentPeriod);
                    
                    // 빈 카드 여부 확인
                    let emptyClass = (!subject && !teacher) ? "empty-card" : "interactive";

                    bodyHtml += `<td class="card-cell col-${c} ${emptyClass}" style="background-color: ${gColor}">`;
                    if (subject || teacher) {
                        bodyHtml += `<div class="card-content">`;
                        if (subject) bodyHtml += `<div class="subject-text">${subject}</div>`;
                        if (teacher) bodyHtml += `<div class="teacher-text">${teacher}</div>`;
                        bodyHtml += `</div>`;
                    }
                    bodyHtml += `</td>`;
                }
                bodyHtml += "</tr>";

                if (hasTeacherRow) rowIndex++; 
            }

            thead.innerHTML = headHtml;
            tbody.innerHTML = bodyHtml;
        }

        // --- 필터 및 검색 ---
        function filterClass() {
            const selectedVal = document.getElementById('class-selector').value;
            const table = document.getElementById('timetable');
            
            const allCells = document.querySelectorAll('#timetable th, #timetable td');
            allCells.forEach(cell => cell.classList.remove('hidden-col'));
            table.classList.remove('filtered-view');

            if (selectedVal !== "all") {
                table.classList.add('filtered-view');
                
                let visibleCols = [];
                if (selectedVal.startsWith('grade-')) {
                    const grade = selectedVal.split('-')[1];
                    if (grade === '1') visibleCols = [1, 2, 3, 4];
                    if (grade === '2') visibleCols = [5, 6, 7, 8, 9];
                    if (grade === '3') visibleCols = [10, 11, 12, 13, 14];
                } else {
                    visibleCols = [parseInt(selectedVal)]; 
                }

                const gradeHeaders = document.querySelectorAll('.grade-header');
                gradeHeaders.forEach(th => {
                    const start = parseInt(th.getAttribute('data-start'));
                    const span = parseInt(th.getAttribute('data-span'));
                    const end = start + span - 1;
                    
                    let visibleCount = 0;
                    for (let i = start; i <= end; i++) {
                        if (visibleCols.includes(i)) visibleCount++;
                    }

                    if (visibleCount > 0) {
                        th.setAttribute('colspan', visibleCount);
                    } else {
                        th.classList.add('hidden-col'); 
                    }
                });

                allCells.forEach(cell => {
                    if(cell.classList.contains('lunch-content')) {
                        cell.setAttribute('colspan', visibleCols.length); 
                        return;
                    }
                    if(cell.classList.contains('time-cell') || cell.classList.contains('time-cell-header') || cell.classList.contains('grade-header')) return;
                    
                    let match = cell.className.match(/col-(\d+)/);
                    if (match) {
                        let colIdx = parseInt(match[1]);
                        if (!visibleCols.includes(colIdx)) {
                            cell.classList.add('hidden-col');
                        }
                    }
                });
            } else {
                 const gradeHeaders = document.querySelectorAll('.grade-header');
                 gradeHeaders.forEach(th => th.setAttribute('colspan', th.getAttribute('data-span')));
                 const lunchContent = document.querySelector('.lunch-content');
                 if(lunchContent) lunchContent.setAttribute('colspan', 14);
            }
        }

        function searchTeacher() {
            const keyword = document.getElementById('teacher-search').value.trim();
            const cardCells = document.querySelectorAll('.card-cell');

            cardCells.forEach(cell => cell.classList.remove('highlight-teacher'));

            if (keyword === "") return;

            cardCells.forEach(cell => {
                const teacherDiv = cell.querySelector('.teacher-text');
                if (teacherDiv && teacherDiv.innerText.includes(keyword)) {
                    cell.classList.add('highlight-teacher');
                }
            });
        }

        // --- 현재 교시 하이라이트 ---
        function checkCurrentPeriod() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const time = h * 100 + m;
            
            const allRows = document.querySelectorAll('#timetable-body tr');
            allRows.forEach(tr => tr.classList.remove('current-period-row'));

            let currentPeriod = -1;
            
            // 실제 학교 일과시간에 맞춰 수정하세요
            if (time >= 850 && time < 935) currentPeriod = 1;
            else if (time >= 945 && time < 1030) currentPeriod = 2;
            else if (time >= 1040 && time < 1125) currentPeriod = 3;
            else if (time >= 1135 && time < 1220) currentPeriod = 4;
            else if (time >= 1220 && time < 1320) currentPeriod = 0; // 점심
            else if (time >= 1320 && time < 1405) currentPeriod = 5;
            else if (time >= 1415 && time < 1500) currentPeriod = 6;
            else if (time >= 1510 && time < 1555) currentPeriod = 7;

            if (currentPeriod !== -1) {
                const targetRows = document.querySelectorAll(`.period-${currentPeriod}`);
                targetRows.forEach(tr => tr.classList.add('current-period-row'));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTimetable();
            // 새로고침 주기: 60초(1분)로 단축하여 실시간성 강화
            setInterval(loadTimetable, 60000); 
            setInterval(checkCurrentPeriod, 30000); 
        });

    </script>
</body>
</html>
