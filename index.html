<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 우리 학교 시간표</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f1f5f9;
            --text-main: #1e293b;
            --border-color: #cbd5e1;
            --lunch-color: #fef08a;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
            background: white;
            padding: 20px 0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: var(--primary-color);
            margin: 0 0 5px 0;
            font-weight: 800;
        }

        .header p {
            font-size: 0.9rem;
            color: #64748b;
            margin: 0 0 15px 0;
        }

        /* 컨트롤 영역 (반 선택, 검색) */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .controls select, .controls input {
            padding: 8px 12px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            font-family: 'Pretendard', sans-serif;
        }

        .controls input:focus, .controls select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px var(--primary-light);
        }

        .table-container {
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            -webkit-overflow-scrolling: touch;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 1100px;
            table-layout: fixed;
        }

        /* 필터링 되었을 때 억지로 넓어지지 않고 화면에 꽉 차게 변경 */
        table.filtered-view {
            min-width: 100%;
        }

        table th:first-child, table td.time-cell {
            width: 65px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 6px 4px; /* 패딩을 약간 늘려 여유 공간 확보 */
            text-align: center;
            vertical-align: middle;
            line-height: 1.3;
            white-space: normal;
            word-break: keep-all;
        }

        th { 
            font-weight: 600; 
            font-size: clamp(0.9rem, 1.5vw, 1.1rem); /* 반응형 폰트 */
        }
        
        th.grade-header { 
            font-size: clamp(1.1rem, 2vw, 1.25rem); /* 반응형 폰트 */
            font-weight: 800; 
            padding: 10px 0; 
        }

        td.time-cell, th.time-cell-header {
            font-weight: 700;
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            position: sticky;
            left: 0;
            z-index: 10;
            border-right: 2px solid var(--primary-color);
        }

        td.time-cell-top { border-bottom: none !important; }
        td.time-cell-bottom { border-top: none !important; }

        td.subject-cell {
            font-weight: 800; /* 과목 글자를 더 굵게 */
            /* 반응형 폰트: 최소 0.95rem, 화면에 따라 커지며 최대 1.25rem */
            font-size: clamp(0.95rem, 2vw, 1.25rem); 
            border-bottom: none !important; 
            padding-bottom: 2px;
            color: #1e293b;
            height: 38px; /* 칸 높이 약간 증가 */
            transition: background-color 0.3s;
        }

        td.teacher-cell {
            /* 반응형 폰트: 최소 0.8rem, 최대 0.95rem */
            font-size: clamp(0.8rem, 1.5vw, 0.95rem); 
            color: #475569; /* 색상을 조금 더 진하게 조정 */
            font-weight: 600;
            border-top: none !important; 
            padding-top: 0px;
            height: 22px; 
            transition: background-color 0.3s;
        }

        .lunch-row td {
            background-color: var(--lunch-color) !important;
            font-weight: 800;
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: #854d0e;
            height: 45px;
            border-top: 2px solid #eab308;
            border-bottom: 2px solid #eab308;
            letter-spacing: 2px;
        }
        
        .lunch-row td.time-cell {
            background-color: #fde047 !important;
            border-right: 2px solid var(--primary-color);
        }

        tr:hover td.subject-cell:not(.lunch-row td), tr:hover td.teacher-cell:not(.lunch-row td) {
            filter: brightness(0.95);
        }

        /* 검색 하이라이트 스타일 */
        .highlight-teacher {
            background-color: #fef08a !important; 
            color: #b45309 !important;
            font-weight: 800 !important;
            border-radius: 4px;
        }

        /* 현재 교시 깜빡임 효과 */
        @keyframes pulseBorder {
            0% { box-shadow: inset 0 0 0 2px transparent; }
            50% { box-shadow: inset 0 0 0 3px #3b82f6; }
            100% { box-shadow: inset 0 0 0 2px transparent; }
        }

        .current-period-row td {
            animation: pulseBorder 2s infinite;
            position: relative;
            z-index: 1; 
        }
        
        .hidden-col { display: none !important; }

        .loader-container { padding: 50px; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 600px) {
            .header { padding: 15px 0; margin-bottom: 15px; }
            .controls { flex-direction: column; padding: 0 15px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="main-title">📅 실시간 오늘의 시간표</h1>
        <p>자동 새로고침 적용 중 / 과목명 반응형 확대</p>
        
        <!-- 검색 및 반 선택 컨트롤 (학년별 보기 추가됨) -->
        <div class="controls">
            <select id="class-selector" onchange="filterClass()">
                <option value="all">🏫 전체 보기</option>
                <optgroup label="📚 학년별 보기">
                    <option value="grade-1">1학년 전체</option>
                    <option value="grade-2">2학년 전체</option>
                    <option value="grade-3">3학년 전체</option>
                </optgroup>
                <optgroup label="🌱 1학년">
                    <option value="1">1학년 1반</option>
                    <option value="2">1학년 2반</option>
                    <option value="3">1학년 3반</option>
                    <option value="4">1학년 4반</option>
                </optgroup>
                <optgroup label="🌿 2학년">
                    <option value="5">2학년 1반</option>
                    <option value="6">2학년 2반</option>
                    <option value="7">2학년 3반</option>
                    <option value="8">2학년 4반</option>
                    <option value="9">2학년 5반</option>
                </optgroup>
                <optgroup label="🌳 3학년">
                    <option value="10">3학년 1반</option>
                    <option value="11">3학년 2반</option>
                    <option value="12">3학년 3반</option>
                    <option value="13">3학년 4반</option>
                    <option value="14">3학년 5반</option>
                </optgroup>
            </select>
            <input type="text" id="teacher-search" placeholder="선생님 이름 검색 (예: 임승언)" onkeyup="searchTeacher()">
        </div>
    </div>

    <div class="table-container">
        <div id="loader" class="loader-container">
            <div class="loader"></div>
            <div>시간표 데이터를 불러오고 예쁘게 꾸미는 중입니다...</div>
        </div>
        <table id="timetable">
            <thead id="timetable-head">
                <!-- 헤더 렌더링 영역 -->
            </thead>
            <tbody id="timetable-body">
                <!-- 본문 렌더링 영역 -->
            </tbody>
        </table>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBWdcFSF8js6Hhr5o2HA8kdfxRcWwd6MF_Rkn6gBcaZI47_6AOMXnQZPYXvgjv81Wvx8TD98UkfbGY/pub?gid=0&single=true&output=csv";

        let globalTimetableData = [];

        function setTodayTitle() {
            const today = new Date();
            const month = today.getMonth() + 1;
            const date = today.getDate();
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            const dayName = dayNames[today.getDay()];
            document.getElementById('main-title').innerText = `📅 실시간 ${month}월 ${date}일(${dayName}) 시간표`;
        }

        function getGradeColor(colIndex, periodNum) {
            const isEvenPeriod = periodNum % 2 === 0;
            if (colIndex >= 1 && colIndex <= 4) return isEvenPeriod ? "#fef08a" : "#fef9c3";
            if (colIndex >= 5 && colIndex <= 9) return isEvenPeriod ? "#bbf7d0" : "#dcfce3";
            if (colIndex >= 10 && colIndex <= 14) return isEvenPeriod ? "#bfdbfe" : "#dbeafe";
            return "#ffffff";
        }

        function getPeriodColor(periodNum) {
            return periodNum % 2 !== 0 ? "#ffffff" : "#f1f5f9";
        }

        function loadTimetable() {
            setTodayTitle();

            Papa.parse(sheetCsvUrl, {
                download: true,
                header: false,
                skipEmptyLines: 'greedy',
                complete: function(results) {
                    globalTimetableData = results.data;
                    renderTable();
                    document.getElementById('loader').style.display = 'none';
                    
                    filterClass(); // 적용된 필터 유지
                    searchTeacher(); // 검색 유지
                    checkCurrentPeriod();
                },
                error: function(err) {
                    document.getElementById('loader').innerHTML = `<div style="color:red; font-weight:bold;">데이터를 불러오지 못했습니다.</div>`;
                }
            });
        }

        function renderTable() {
            if(!globalTimetableData.length) return;
            const thead = document.getElementById('timetable-head');
            const tbody = document.getElementById('timetable-body');
            
            let headHtml = "";
            let bodyHtml = "";
            let currentPeriod = 1;

            globalTimetableData.forEach((row, rowIndex) => {
                let slicedRow = row.slice(0, 15); 
                if (rowIndex === 0) return;

                if (rowIndex === 1) {
                    headHtml += "<tr>";
                    headHtml += `<th rowspan="2" class="time-cell-header" style="background-color: var(--primary-color); color: white;">교시</th>`;
                    let currentHeader = "";
                    let colspanCount = 0;
                    let startIndex = 1;
                    for (let i = 1; i < 15; i++) {
                        let cell = slicedRow[i] ? slicedRow[i].trim() : "";
                        if (cell !== "") {
                            if (currentHeader !== "") {
                                headHtml += `<th class="grade-header col-${startIndex}" colspan="${colspanCount}" style="background-color: ${getGradeColor(startIndex, 1)}; color: #1e293b;" data-start="${startIndex}" data-span="${colspanCount}">${currentHeader}</th>`;
                            }
                            currentHeader = cell;
                            colspanCount = 1;
                            startIndex = i;
                        } else {
                            if (currentHeader !== "") colspanCount++;
                        }
                    }
                    if (currentHeader !== "") {
                        headHtml += `<th class="grade-header col-${startIndex}" colspan="${colspanCount}" style="background-color: ${getGradeColor(startIndex, 1)}; color: #1e293b;" data-start="${startIndex}" data-span="${colspanCount}">${currentHeader}</th>`;
                    }
                    headHtml += "</tr>";
                    return;
                }

                if (rowIndex === 2) {
                    headHtml += "<tr>";
                    for (let i = 1; i < 15; i++) {
                        let cell = slicedRow[i] ? slicedRow[i].replace(/\n/g, "<br>") : "";
                        headHtml += `<th class="col-${i}" style="background-color: ${getGradeColor(i, 1)}; color: #1e293b;">${cell}</th>`;
                    }
                    headHtml += "</tr>";
                    return;
                }

                let isTeacherRow = slicedRow[0] === undefined || slicedRow[0].trim() === "";
                let isLunchRow = false;

                if (!isTeacherRow && slicedRow[0]) {
                    if (slicedRow[0].includes("점심")) {
                        isLunchRow = true;
                        currentPeriod = 0;
                    } else {
                        let match = slicedRow[0].match(/\d+/);
                        if (match) currentPeriod = parseInt(match[0], 10);
                    }
                }

                if (isLunchRow) {
                     bodyHtml += `<tr class="lunch-row period-0">`;
                     bodyHtml += `<td class="time-cell">점심</td>`;
                     let lunchText = slicedRow[0].replace(/\n/g, " "); 
                     bodyHtml += `<td colspan="14" class="lunch-content">${lunchText}</td>`;
                     bodyHtml += `</tr>`;
                     return;
                }
                
                if(isTeacherRow && currentPeriod === 0) return;

                let pColor = getPeriodColor(currentPeriod);
                
                bodyHtml += `<tr class="period-${currentPeriod}">`;
                slicedRow.forEach((cell, cellIndex) => {
                    let formattedCell = cell ? cell.replace(/\n/g, "<br>") : "";
                    let gColor = getGradeColor(cellIndex, currentPeriod);

                    if (cellIndex === 0) {
                        if (isTeacherRow) {
                            bodyHtml += `<td class="time-cell time-cell-bottom" style="background-color: ${pColor}">${formattedCell}</td>`;
                        } else {
                            bodyHtml += `<td class="time-cell time-cell-top" style="background-color: ${pColor}">${formattedCell}</td>`;
                        }
                    } else {
                        if (isTeacherRow) {
                            bodyHtml += `<td class="teacher-cell col-${cellIndex}" style="background-color: ${gColor}">${formattedCell}</td>`;
                        } else {
                            bodyHtml += `<td class="subject-cell col-${cellIndex}" style="background-color: ${gColor}">${formattedCell}</td>`;
                        }
                    }
                });
                bodyHtml += "</tr>";
            });

            thead.innerHTML = headHtml;
            tbody.innerHTML = bodyHtml;
        }

        // --- 기능 1 업데이트: 학년별, 반별 보기 통합 필터 ---
        function filterClass() {
            const selectedVal = document.getElementById('class-selector').value;
            const table = document.getElementById('timetable');
            
            // 모든 컬럼 숨김 해제 및 초기화
            const allCells = document.querySelectorAll('#timetable th, #timetable td');
            allCells.forEach(cell => cell.classList.remove('hidden-col'));
            table.classList.remove('filtered-view');

            if (selectedVal !== "all") {
                table.classList.add('filtered-view');
                
                let visibleCols = [];
                // 선택한 값이 학년 단위인지 반 단위인지 체크
                if (selectedVal.startsWith('grade-')) {
                    const grade = selectedVal.split('-')[1];
                    if (grade === '1') visibleCols = [1, 2, 3, 4];
                    if (grade === '2') visibleCols = [5, 6, 7, 8, 9];
                    if (grade === '3') visibleCols = [10, 11, 12, 13, 14];
                } else {
                    visibleCols = [parseInt(selectedVal)]; // 단일 반
                }

                // 1. 헤더 (Row 1 - 학년) 병합(colspan) 조정
                const gradeHeaders = document.querySelectorAll('.grade-header');
                gradeHeaders.forEach(th => {
                    const start = parseInt(th.getAttribute('data-start'));
                    const span = parseInt(th.getAttribute('data-span'));
                    const end = start + span - 1;
                    
                    // 현재 학년 헤더 범위 내에 보이는 열(반)이 몇 개인지 계산
                    let visibleCount = 0;
                    for (let i = start; i <= end; i++) {
                        if (visibleCols.includes(i)) visibleCount++;
                    }

                    if (visibleCount > 0) {
                        th.setAttribute('colspan', visibleCount);
                    } else {
                        th.classList.add('hidden-col'); // 해당 학년 열이 하나도 없으면 헤더 숨김
                    }
                });

                // 2. 나머지 셀 숨김 처리
                allCells.forEach(cell => {
                    if(cell.classList.contains('lunch-content')) {
                        cell.setAttribute('colspan', visibleCols.length); // 점심시간 병합 너비 조절
                        return;
                    }
                    if(cell.classList.contains('time-cell') || cell.classList.contains('time-cell-header') || cell.classList.contains('grade-header')) return;
                    
                    let match = cell.className.match(/col-(\d+)/);
                    if (match) {
                        let colIdx = parseInt(match[1]);
                        if (!visibleCols.includes(colIdx)) {
                            cell.classList.add('hidden-col');
                        }
                    }
                });
            } else {
                 // 전체 보기 복원
                 const gradeHeaders = document.querySelectorAll('.grade-header');
                 gradeHeaders.forEach(th => th.setAttribute('colspan', th.getAttribute('data-span')));
                 const lunchContent = document.querySelector('.lunch-content');
                 if(lunchContent) lunchContent.setAttribute('colspan', 14);
            }
        }

        // --- 기능 3: 선생님 이름 검색 ---
        function searchTeacher() {
            const keyword = document.getElementById('teacher-search').value.trim();
            const teacherCells = document.querySelectorAll('.teacher-cell');
            const subjectCells = document.querySelectorAll('.subject-cell');

            teacherCells.forEach(cell => cell.classList.remove('highlight-teacher'));
            subjectCells.forEach(cell => cell.classList.remove('highlight-teacher'));

            if (keyword === "") return;

            teacherCells.forEach(tCell => {
                if (tCell.innerText.includes(keyword)) {
                    tCell.classList.add('highlight-teacher');
                    
                    let colMatch = tCell.className.match(/col-(\d+)/);
                    if(colMatch) {
                        let colIdx = colMatch[1];
                        let prevRow = tCell.parentElement.previousElementSibling;
                        if(prevRow) {
                            let sCell = prevRow.querySelector(`.col-${colIdx}`);
                            if(sCell) sCell.classList.add('highlight-teacher');
                        }
                    }
                }
            });
        }

        // --- 기능 2: 현재 교시 실시간 깜빡임 ---
        function checkCurrentPeriod() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const time = h * 100 + m;
            
            const allRows = document.querySelectorAll('#timetable-body tr');
            allRows.forEach(tr => tr.classList.remove('current-period-row'));

            let currentPeriod = -1;
            
            // 시간 설정 (필요시 수정)
            if (time >= 850 && time < 935) currentPeriod = 1;
            else if (time >= 945 && time < 1030) currentPeriod = 2;
            else if (time >= 1040 && time < 1125) currentPeriod = 3;
            else if (time >= 1135 && time < 1220) currentPeriod = 4;
            else if (time >= 1220 && time < 1320) currentPeriod = 0; // 점심
            else if (time >= 1320 && time < 1405) currentPeriod = 5;
            else if (time >= 1415 && time < 1500) currentPeriod = 6;
            else if (time >= 1510 && time < 1555) currentPeriod = 7;

            if (currentPeriod !== -1) {
                const targetRows = document.querySelectorAll(`.period-${currentPeriod}`);
                targetRows.forEach(tr => tr.classList.add('current-period-row'));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTimetable();
            setInterval(loadTimetable, 300000); // 5분 자동 새로고침
            setInterval(checkCurrentPeriod, 60000); // 1분 현재시간 체크
        });

    </script>
</body>
</html>
