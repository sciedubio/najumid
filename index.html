<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 우리 학교 시간표</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-light: #e0e7ff;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 1200px;
        }

        .header h1 {
            font-size: 1.75rem;
            color: var(--primary-color);
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .header p {
            font-size: 0.95rem;
            color: #64748b;
            margin: 0;
        }

        .table-container {
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 800px; 
            font-size: 0.85rem;
            white-space: nowrap;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: center;
            vertical-align: middle;
            line-height: 1.4;
        }

        /* 1~3행 헤더 부분 스타일 */
        th {
            background-color: var(--primary-color);
            color: #ffffff;
            font-weight: 600;
            border-color: #6366f1;
        }

        /* 교시를 나타내는 첫 번째 열 고정 및 스타일 */
        td.time-cell, th:first-child {
            font-weight: 700;
            background-color: var(--primary-light);
            color: var(--primary-color);
            position: sticky;
            left: 0;
            z-index: 10;
            border-right: 2px solid var(--primary-color);
        }

        /* 과목명-선생님 셀 병합처럼 보이게 하는 트릭 (상하 테두리 제거) */
        td.time-cell-top { border-bottom: none !important; }
        td.time-cell-bottom { border-top: none !important; }

        td.subject-cell {
            font-weight: 700;
            border-bottom: none !important; /* 아래 테두리 제거 */
            padding-bottom: 2px;
            color: #1e293b;
        }

        td.teacher-cell {
            font-size: 0.75rem;
            color: #64748b; /* 선생님 이름은 회색으로 작게 */
            border-top: none !important; /* 위 테두리 제거 */
            padding-top: 2px;
        }

        /* 호버 효과 */
        tr:hover td.subject-cell, tr:hover td.teacher-cell {
            filter: brightness(0.95);
        }

        /* 로딩 애니메이션 */
        .loader-container { padding: 50px; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>📅 실시간 오늘의 시간표</h1>
        <p>자동 서식 입히기 적용 완료!</p>
    </div>

    <div class="table-container">
        <div id="loader" class="loader-container">
            <div class="loader"></div>
            <div>시간표 데이터를 불러오고 예쁘게 꾸미는 중입니다...</div>
        </div>
        <table id="timetable">
            <tbody id="timetable-body">
                <!-- JS로 렌더링 -->
            </tbody>
        </table>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRRri5Q0YRwIkcGrjMpqeyrZPQJBJTiQ9F9YKMJxrvYk_P2Q9LZW7sP61nQMtXse5-S85zFbXBOz9f_/pub?gid=1583258371&single=true&output=csv";

        // 과목명에 따라 자동으로 배경 파스텔톤 색상을 지정하는 함수
        function getColorForSubject(subject) {
            const text = subject.trim();
            if (!text || text === "." || text === ",") return "transparent";
            
            if (/국어|화법|독서|문학/.test(text)) return "#fee2e2"; // 빨강 계열
            if (/수학|수1|수2|기하|미적|정1|정2/.test(text)) return "#dbeafe"; // 파랑 계열
            if (/영|영어/.test(text)) return "#fef9c3"; // 노랑 계열
            if (/과|과학|물리|화학|생명|지구/.test(text)) return "#dcfce3"; // 초록 계열
            if (/사|사회|역|역사|도덕|윤리|지리/.test(text)) return "#f3e8ff"; // 보라 계열
            if (/체육|체1|체2|스포츠/.test(text)) return "#ffedd5"; // 주황 계열
            if (/기|기가|정보|컴퓨터/.test(text)) return "#e0e7ff"; // 남색 계열
            if (/음악|미술|예술/.test(text)) return "#fce7f3"; // 핑크 계열
            if (/일어|중국어|한문|외국어/.test(text)) return "#ecfccb"; // 연두 계열
            if (/진로|창체|동아리|주제|자율|봉사|입학/.test(text)) return "#f3f4f6"; // 회색 계열
            
            return "#ffffff"; // 기본 흰색
        }

        function loadTimetable() {
            Papa.parse(sheetCsvUrl, {
                download: true,
                header: false,
                skipEmptyLines: 'greedy',
                complete: function(results) {
                    const data = results.data;
                    const tbody = document.getElementById('timetable-body');
                    let tableHtml = "";

                    // 각 행을 돌면서 서식 적용
                    data.forEach((row, rowIndex) => {
                        tableHtml += "<tr>";
                        
                        // 0, 1, 2번째 행은 요일/학년/반 등이 적힌 헤더(제목) 부분
                        if (rowIndex <= 2) {
                            row.forEach(cell => {
                                tableHtml += `<th>${cell.replace(/\n/g, "<br>")}</th>`;
                            });
                        } else {
                            // 본문 데이터: 첫 번째 셀(A열, 시간/교시)이 비어있으면 선생님 이름이 적힌 행으로 판단
                            let isTeacherRow = row[0] === undefined || row[0].trim() === "";
                            
                            row.forEach((cell, cellIndex) => {
                                let formattedCell = cell.replace(/\n/g, "<br>");
                                
                                if (cellIndex === 0) {
                                    // 1열(시간) 디자인 처리 (상하 테두리 지워서 셀 병합처럼 보이게)
                                    if (isTeacherRow) {
                                        tableHtml += `<td class="time-cell time-cell-bottom"></td>`;
                                    } else {
                                        tableHtml += `<td class="time-cell time-cell-top">${formattedCell}</td>`;
                                    }
                                } else {
                                    // 데이터 열 디자인 처리
                                    if (isTeacherRow) {
                                        tableHtml += `<td class="teacher-cell">${formattedCell}</td>`;
                                    } else {
                                        let bgColor = getColorForSubject(cell);
                                        tableHtml += `<td class="subject-cell" style="background-color: ${bgColor}">${formattedCell}</td>`;
                                    }
                                }
                            });
                        }
                        tableHtml += "</tr>";
                    });

                    tbody.innerHTML = tableHtml;
                    document.getElementById('loader').style.display = 'none';
                },
                error: function(err) {
                    document.getElementById('loader').innerHTML = `<div style="color:red">데이터를 불러오지 못했습니다.</div>`;
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadTimetable);
    </script>
</body>
</html>
