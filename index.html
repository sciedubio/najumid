<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 우리 학교 시간표</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 1200px;
        }

        .header h1 {
            font-size: 1.75rem;
            color: var(--primary-color);
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .header p {
            font-size: 0.95rem;
            color: #64748b;
            margin: 0;
        }

        .table-container {
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 1300px; /* 모바일 가로 스크롤을 위한 최소 너비 */
            table-layout: fixed; /* ★ 모든 열의 너비를 동일하게 강제 고정 */
            font-size: 0.85rem;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 8px 4px;
            text-align: center;
            vertical-align: middle;
            line-height: 1.4;
            white-space: normal; /* 글자가 칸을 넘어가면 줄바꿈 허용 */
            word-break: keep-all; /* 단어 단위로 깔끔하게 줄바꿈 */
        }

        th {
            font-weight: 600;
        }

        /* 첫 번째 열(교시) 고정 설정 */
        td.time-cell, th:first-child {
            font-weight: 700;
            position: sticky;
            left: 0;
            z-index: 10;
            border-right: 2px solid var(--primary-color);
        }

        /* 과목명-선생님 셀 병합처럼 보이게 하는 트릭 */
        td.time-cell-top { border-bottom: none !important; }
        td.time-cell-bottom { border-top: none !important; }

        td.subject-cell {
            font-weight: 700;
            border-bottom: none !important; 
            padding-bottom: 2px;
            color: #1e293b;
        }

        td.teacher-cell {
            font-size: 0.75rem;
            color: #64748b; 
            border-top: none !important; 
            padding-top: 2px;
        }

        /* 호버 효과 */
        tr:hover td.subject-cell, tr:hover td.teacher-cell {
            filter: brightness(0.95);
        }

        /* 로딩 애니메이션 */
        .loader-container { padding: 50px; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>📅 실시간 오늘의 시간표</h1>
        <p>열 너비 균일화 및 학년/교시별 색상 적용</p>
    </div>

    <div class="table-container">
        <div id="loader" class="loader-container">
            <div class="loader"></div>
            <div>시간표 데이터를 불러오고 예쁘게 꾸미는 중입니다...</div>
        </div>
        <table id="timetable">
            <tbody id="timetable-body">
                <!-- JS로 렌더링 -->
            </tbody>
        </table>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRRri5Q0YRwIkcGrjMpqeyrZPQJBJTiQ9F9YKMJxrvYk_P2Q9LZW7sP61nQMtXse5-S85zFbXBOz9f_/pub?gid=1583258371&single=true&output=csv";

        // ★ 학년별 배경색 지정 (열 인덱스 기준)
        function getGradeColor(colIndex) {
            if (colIndex >= 1 && colIndex <= 4) return "#fef9c3"; // 1학년 (연한 노랑)
            if (colIndex >= 5 && colIndex <= 9) return "#dcfce3"; // 2학년 (연한 초록)
            if (colIndex >= 10 && colIndex <= 14) return "#dbeafe"; // 3학년 (연한 파랑)
            if (colIndex >= 15 && colIndex <= 16) return "#f3e8ff"; // 특수학급 (연한 보라)
            return "#ffffff"; // 그 외
        }

        // ★ 교시별 배경색 지정 (왼쪽 첫 번째 열)
        function getPeriodColor(periodNum) {
            const colors = [
                "#ffffff", // 0 (기본/점심 등)
                "#ffe4e6", // 1교시 (연분홍)
                "#ffedd5", // 2교시 (연주황)
                "#fef3c7", // 3교시 (연노랑)
                "#dcfce3", // 4교시 (연초록)
                "#dbeafe", // 5교시 (연파랑)
                "#e0e7ff", // 6교시 (연남색)
                "#fae8ff"  // 7교시 (연자주/보라)
            ];
            return colors[periodNum] || "#f8fafc";
        }

        function loadTimetable() {
            Papa.parse(sheetCsvUrl, {
                download: true,
                header: false,
                skipEmptyLines: 'greedy',
                complete: function(results) {
                    const data = results.data;
                    const tbody = document.getElementById('timetable-body');
                    let tableHtml = "";
                    let currentPeriod = 0;

                    // 각 행을 순회
                    data.forEach((row, rowIndex) => {
                        // ★ 불필요한 우측 데이터(선생님 목록 등)를 자르고 정확히 17칸(0~16)만 사용
                        let slicedRow = row.slice(0, 17);
                        tableHtml += "<tr>";
                        
                        // 상단 헤더 부분 (요일, 학년, 반)
                        if (rowIndex <= 2) {
                            slicedRow.forEach((cell, cellIndex) => {
                                let formattedCell = cell ? cell.replace(/\n/g, "<br>") : "";
                                
                                // 헤더 색상 계산
                                let bgColor = getGradeColor(cellIndex);
                                let textColor = "#1e293b";
                                
                                // 맨 윗줄 전체이거나, 좌측 첫번째 교시열의 상단은 메인 컬러 적용
                                if (rowIndex === 0 || cellIndex === 0) {
                                    bgColor = "var(--primary-color)";
                                    textColor = "#ffffff";
                                }

                                tableHtml += `<th style="background-color: ${bgColor}; color: ${textColor}; border-color: #cbd5e1;">${formattedCell}</th>`;
                            });
                        } 
                        // 본문 데이터 부분 (시간표 내용)
                        else {
                            let isTeacherRow = slicedRow[0] === undefined || slicedRow[0].trim() === "";
                            
                            // 현재 몇 교시인지 파악 (숫자 추출)
                            if (!isTeacherRow && slicedRow[0]) {
                                if (slicedRow[0].includes("점심")) {
                                    currentPeriod = 0; 
                                } else {
                                    let match = slicedRow[0].match(/\d+/);
                                    if (match) currentPeriod = parseInt(match[0], 10);
                                }
                            }

                            // 해당 교시의 색상 가져오기
                            let pColor = getPeriodColor(currentPeriod);
                            if (slicedRow[0] && slicedRow[0].includes("점심")) pColor = "#f1f5f9"; // 점심시간 색상 예외처리

                            slicedRow.forEach((cell, cellIndex) => {
                                let formattedCell = cell ? cell.replace(/\n/g, "<br>") : "";
                                let gColor = getGradeColor(cellIndex); // 해당 칸의 학년별 색상

                                if (cellIndex === 0) {
                                    // 1열(교시) 디자인
                                    if (isTeacherRow) {
                                        tableHtml += `<td class="time-cell time-cell-bottom" style="background-color: ${pColor}">${formattedCell}</td>`;
                                    } else {
                                        tableHtml += `<td class="time-cell time-cell-top" style="background-color: ${pColor}">${formattedCell}</td>`;
                                    }
                                } else {
                                    // 데이터 열(학년/반) 디자인
                                    if (isTeacherRow) {
                                        tableHtml += `<td class="teacher-cell" style="background-color: ${gColor}">${formattedCell}</td>`;
                                    } else {
                                        tableHtml += `<td class="subject-cell" style="background-color: ${gColor}">${formattedCell}</td>`;
                                    }
                                }
                            });
                        }
                        tableHtml += "</tr>";
                    });

                    tbody.innerHTML = tableHtml;
                    document.getElementById('loader').style.display = 'none';
                },
                error: function(err) {
                    document.getElementById('loader').innerHTML = `<div style="color:red; font-weight:bold;">데이터를 불러오지 못했습니다.</div>`;
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadTimetable);
    </script>
</body>
</html>
